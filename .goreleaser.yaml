version: 2

project_name: fbcli

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/fbcli
    binary: fbcli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: mrgoonie
      name: homebrew-tap
    homepage: "https://github.com/mrgoonie/fbcli"
    description: "Facebook Page CLI - post and manage your Facebook Page from the terminal"
    license: "MIT"
